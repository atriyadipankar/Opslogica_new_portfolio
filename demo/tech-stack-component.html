<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Tech Stack Component</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #060612;
      --bg-secondary: #0c0c24;
      --bg-card: rgba(15, 15, 40, 0.6);
      --bg-glass: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --neon-cyan: #00e5ff;
      --neon-purple: #7c3aed;
      --neon-magenta: #f43f8e;
      --text-primary: #f0f0ff;
      --text-secondary: #8b8ba7;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --glow-cyan: 0 0 20px rgba(0, 229, 255, 0.3), 0 0 60px rgba(0, 229, 255, 0.1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-secondary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════
       TECH STACK COMPONENT — START
       Copy everything between START and END
    ═══════════════════════════════════════ */
    .tech-stack {
      padding: clamp(80px, 10vw, 140px) 0;
      overflow: hidden;
    }

    .tech-stack .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    .tech-header {
      text-align: center;
      margin-bottom: 64px;
    }

    .tech-header .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 16px;
    }

    .tech-header .section-label::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--neon-cyan);
    }

    .tech-header .section-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .tech-header .section-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 550px;
      margin: 0 auto;
    }

    /* ── Orbit Container ── */
    .tech-orbit-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1;
      margin: 0 auto;
    }

    /* ── Center Node ── */
    .tech-orbit-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      box-shadow: var(--glow-cyan);
      z-index: 3;
    }

    /* ── Orbit Rings ── */
    .tech-orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px solid var(--border-glass);
    }

    .tech-orbit-ring-1 {
      width: 280px;
      height: 280px;
      transform: translate(-50%, -50%);
      animation: orbitRotate 30s linear infinite;
    }

    .tech-orbit-ring-2 {
      width: 420px;
      height: 420px;
      transform: translate(-50%, -50%);
      animation: orbitRotate 45s linear infinite reverse;
    }

    .tech-orbit-ring-3 {
      width: 560px;
      height: 560px;
      transform: translate(-50%, -50%);
      animation: orbitRotate 60s linear infinite;
    }

    @keyframes orbitRotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* ── Tech Nodes ── */
    .tech-node {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      cursor: default;
    }

    .tech-node svg {
      width: 30px;
      height: 30px;
    }

    .tech-node:hover {
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
      transform: scale(1.15);
    }

    /* Counter-rotate nodes to keep text upright */
    .tech-orbit-ring-1 .tech-node { animation: counterRotate 30s linear infinite; }
    .tech-orbit-ring-2 .tech-node { animation: counterRotate 45s linear infinite reverse; }
    .tech-orbit-ring-3 .tech-node { animation: counterRotate 60s linear infinite; }

    @keyframes counterRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    /* ── Node Positions (Ring 1 — 4 nodes at N/S/W/E) ── */
    .tech-orbit-ring-1 .tech-node:nth-child(1) { top: -28px; left: 50%; margin-left: -28px; }
    .tech-orbit-ring-1 .tech-node:nth-child(2) { bottom: -28px; left: 50%; margin-left: -28px; }
    .tech-orbit-ring-1 .tech-node:nth-child(3) { left: -28px; top: 50%; margin-top: -28px; }
    .tech-orbit-ring-1 .tech-node:nth-child(4) { right: -28px; top: 50%; margin-top: -28px; }

    /* ── Node Positions (Ring 2 — 6 nodes) ── */
    .tech-orbit-ring-2 .tech-node:nth-child(1) { top: -28px; left: 50%; margin-left: -28px; }
    .tech-orbit-ring-2 .tech-node:nth-child(2) { bottom: -28px; left: 50%; margin-left: -28px; }
    .tech-orbit-ring-2 .tech-node:nth-child(3) { left: -28px; top: 50%; margin-top: -28px; }
    .tech-orbit-ring-2 .tech-node:nth-child(4) { right: -28px; top: 50%; margin-top: -28px; }
    .tech-orbit-ring-2 .tech-node:nth-child(5) { top: 12%; left: 88%; margin-left: -28px; }
    .tech-orbit-ring-2 .tech-node:nth-child(6) { bottom: 12%; left: 8%; margin-left: -28px; }

    /* ── Node Positions (Ring 3 — 6 nodes) ── */
    .tech-orbit-ring-3 .tech-node:nth-child(1) { top: -28px; left: 50%; margin-left: -28px; }
    .tech-orbit-ring-3 .tech-node:nth-child(2) { bottom: -28px; left: 50%; margin-left: -28px; }
    .tech-orbit-ring-3 .tech-node:nth-child(3) { left: -28px; top: 50%; margin-top: -28px; }
    .tech-orbit-ring-3 .tech-node:nth-child(4) { right: -28px; top: 50%; margin-top: -28px; }
    .tech-orbit-ring-3 .tech-node:nth-child(5) { top: 6%; right: 12%; }
    .tech-orbit-ring-3 .tech-node:nth-child(6) { bottom: 6%; left: 12%; }

    /* ── Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      .tech-orbit-ring-1, .tech-orbit-ring-2, .tech-orbit-ring-3,
      .tech-orbit-ring-1 .tech-node,
      .tech-orbit-ring-2 .tech-node,
      .tech-orbit-ring-3 .tech-node {
        animation: none !important;
      }
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .tech-orbit-container { max-width: 450px; }
      .tech-orbit-ring-3 { display: none; }
    }

    @media (max-width: 768px) {
      .tech-orbit-container { max-width: 350px; }
      .tech-orbit-ring-2 { display: none; }
    }
    /* ═══════════════════════════════════════
       TECH STACK COMPONENT — END
    ═══════════════════════════════════════ */
  </style>
</head>
